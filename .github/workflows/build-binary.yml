name: Build Shanocast Binary

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-linux:
    name: Build static Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build static Linux binary
        run: |
          nix build .#shanocast-static --print-build-logs
          mkdir -p dist
          cp -L result/bin/shanocast dist/shanocast-linux-x86_64
          chmod +x dist/shanocast-linux-x86_64

      - name: Verify static Linux binary
        run: |
          file dist/shanocast-linux-x86_64
          file dist/shanocast-linux-x86_64 | grep -q 'statically linked'
          if ldd dist/shanocast-linux-x86_64 2>&1 | tee ldd.txt | grep -qv 'not a dynamic executable'; then
            echo 'Binary is dynamically linked:'
            cat ldd.txt
            exit 1
          fi
          if readelf -d dist/shanocast-linux-x86_64 > dynamic.txt 2>/dev/null; then
            echo 'Binary has a dynamic section:'
            cat dynamic.txt
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: shanocast-linux-x86_64-static
          path: dist/shanocast-linux-x86_64
          retention-days: 5
