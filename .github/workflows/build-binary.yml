name: Build Shanocast Binary

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static Linux binary
        run: |
          mkdir -p dist/linux-${{ matrix.arch }}
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg EXTRA_GN_ARGS='use_sysroot=false' \
            --target artifact \
            --output type=local,dest=dist/linux-${{ matrix.arch }} \
            -f docker/Dockerfile .
          mv dist/linux-${{ matrix.arch }}/shanocast dist/shanocast-linux-${{ matrix.arch }}
          chmod +x dist/shanocast-linux-${{ matrix.arch }}

      - name: Inspect Linux binary
        run: |
          file dist/shanocast-linux-${{ matrix.arch }}
          readelf -d dist/shanocast-linux-${{ matrix.arch }} || true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: shanocast-linux-${{ matrix.arch }}
          path: dist/shanocast-linux-${{ matrix.arch }}
          retention-days: 5
